      @media print {

        /* Optimize content for print */

          color: #000;
          background: #fff;
          max-width: 100%;
          margin: 0;
          padding: 20px;

        /* Remove shadows, backgrounds, and borders for clean print */

          background: transparent !important;
          border-color: #000 !important;
        }
        
        /* Maintain article structure */

          max-width: 100%;
          padding: 0;
          margin: 0;

        /* Typography for print */

          margin: 0 0 12pt;

        }
        
        h4, h5, h6 {

          page-break-after: avoid;
        }
        
        p, li {

          orphans: 3;
          widows: 3;
        }
        
        /* Code blocks */

          background: #f5f5f5 !important;
          border: 1px solid #ddd !important;
          padding: 4pt;
          font-family: 'Courier New', monospace;
          font-size: 10pt;
          page-break-inside: avoid;
        }
        
        /* Lists */
        ul, ol {
          margin: 6pt 0;
          padding-left: 20pt;
        }
        
        /* Prevent orphaned elements */
        img, table, figure {
          page-break-inside: avoid;
        }
        
        /* Links */
        a {
          color: #000;
          text-decoration: underline;
        }
        
        /* Hide link URLs for cleaner print */
        a[href]:after {
          content: none;
        }
        
        /* Example boxes and callouts */
        .bg-blue-50, .bg-green-50, .bg-yellow-50, .bg-red-50 {
          background: #f9f9f9 !important;
          border: 1px solid #ccc !important;

        /* Ensure dark mode doesn't affect print */

          color: #000 !important;

    <!-- Service Worker Registration - Only for production -->
    <script>
      if ('serviceWorker' in navigator) {
        // Only register service worker in production (not localhost)
        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').then(function(registration) {
              console.log('ServiceWorker registered:', registration.scope);
            }).catch(function(err) {
              console.log('ServiceWorker registration failed:', err);
            });
          });
        } else {
          // Unregister service workers on localhost
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) {
              registration.unregister();
            }
          });
        }
      }
    </script>

    
    <!-- Google Fonts - Load after user interaction for better FCP/LCP -->
    <script>
      var fontsLoaded = false;
      function loadFonts() {
        if (fontsLoaded) return;
        fontsLoaded = true;
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap';
        document.head.appendChild(link);
        document.fonts.ready.then(function() {
          document.documentElement.style.setProperty('--font-body', "'Inter', system-ui, sans-serif");
          document.documentElement.style.setProperty('--font-heading', "'Poppins', system-ui, sans-serif");
        });
      }
      window.addEventListener('scroll', loadFonts, { once: true, passive: true });
      window.addEventListener('click', loadFonts, { once: true });
      setTimeout(loadFonts, 3000);
    </script>
    
    <!-- Google AdSense - Lazy loaded for better performance -->
    <script>
      // Pre-initialize the adsbygoogle queue so React pushes are never lost,
      // even if the AdSense script hasn't finished loading yet (fixes mobile race condition).
      window.adsbygoogle = window.adsbygoogle || [];

      var adsenseLoaded = false;
      function loadAdsense() {
        if (!adsenseLoaded) {
          adsenseLoaded = true;
          var script = document.createElement('script');
          script.async = true;
          script.crossOrigin = 'anonymous';
          script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4709657806016589';
          document.head.appendChild(script);
        }
      }
      // Load AdSense after user interaction or 6 second delay (after LCP)
      window.addEventListener('scroll', loadAdsense, { once: true, passive: true });
      window.addEventListener('click', loadAdsense, { once: true });
      window.addEventListener('touchstart', loadAdsense, { once: true, passive: true });
      setTimeout(loadAdsense, 6000);
    </script>
